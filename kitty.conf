#: Advanced {{{
shell /bin/zsh
editor nvim
close_on_child_death no
remote_control_password "dorothy"
allow_remote_control yes
listen_on none
update_check_interval 0
startup_session none
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size 1024
file_transfer_confirmation_bypass dorothy
allow_hyperlinks yes
shell_integration enabled no_cursor
allow_cloning ask
clone_source_strategies venv,conda,env_var,path
notify_on_cmd_finish never
term xterm-kitty
terminfo_type path
forward_stdio no

#: Color scheme {{{
# Rabbit
include current-theme.conf
# bg fg cursor url 
background #010212
foreground #8688ff
cursor #fffad8
cursor_text_color #032a7d
selection_foreground #030015
selection_background #5d57ff
url_color #ccff92

# tabs
active_tab_foreground #050816
active_tab_background #9411ff
inactive_tab_foreground #5555ff
inactive_tab_background #192555
tab_bar_background none

# Black / Gray
color0  #06090d
color8  #0a0a1f

# Red / Pink neon
color1  #ff00c8
color9  #eb50ff

# Green / Aqua
color2  #00ffd4
color10 #69ffee

# Yellow
color3  #ffe066
color11 #feffcb

# Blue
color4  #004cff
color12 #4343ff

# Purple
color5  #7700ff
color13 #805aff

# Cyan / Sky
color6  #00aaff
color14 #4c94ff

# Foreground lavender family
color7  #8688ff
color15 #97a7ff
  mark1_foreground #050816
  mark1_background #00ffd4
  mark2_foreground #050816
  mark2_background #8c6bff
  mark3_foreground #050816
  mark3_background #ff3bd4
  active_border_color #22e6ff
  inactive_border_color #3a2c7a
  bell_border_color #4d06ff

background_opacity 1.0
background_blur 20
dynamic_background_opacity no
background_image none
background_image_layout tiled
background_image_linear no
background_tint 0.0
background_tint_gaps 1.0
dim_opacity 0.4
selection_foreground #E19FB8
selection_background #465688

#: Fonts {{{
# BEGIN_KITTY_FONTS
font_family      family="EnvyCodeR Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 13.0
force_ltr yes
font_features -liga -calt
disable_ligatures never
box_drawing_scale 0.001, 1, 1.5, 2
# modify_font

# URLs in Kitty
undercurl_style thin-sparse
url_color #8930FF
url_style curly
underline_exclusion 1
text_composition_strategy platform
text_fg_override_threshold 0

#: General {{{
vim :fileencoding=utf-8:foldmethod=marker

#: Keyboard shortcuts {{{
kitty_mod ctrl+shift
clear_all_shortcuts no
map ctrl+shift+backslash combine : goto_layout splits : launch --location=vsplit

#: Mouse {{{
mouse_hide_wait 3.0

open_url_with default
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh www text/* image/* application/pdf
detect_urls yes
url_excluded_characters \\
show_hyperlink_targets yes
underline_hyperlinks always
copy_on_select yes
clear_selection_on_clipboard_loss no
paste_actions quote-urls-at-prompt,confirm
strip_trailing_spaces smart
select_by_word_characters @-./_~?&=%+#
click_interval -1.0
focus_follows_mouse yes
pointer_shape_when_grabbed arrow
default_pointer_shape beam
pointer_shape_when_dragging beam crosshair

#: Mouse actions {{{
clear_all_mouse_actions no

#: OS specific tweaks {{{
# wayland_titlebar_color system
# macos_titlebar_color system
macos_option_as_alt no
macos_hide_from_tasks no
macos_quit_when_last_window_closed no
macos_window_resizable yes
macos_thicken_font 0
macos_traditional_fullscreen no
macos_show_window_title_in all
macos_menubar_title_max_length 0
macos_custom_beam_cursor no
macos_colorspace srgb
linux_display_server auto
wayland_enable_ime yes

#: Performance tuning {{{
repaint_delay 10
input_delay 3
sync_to_monitor yes

#: Scrollback {{{
scrollback_lines 10000
scrollbar scrolled
scrollbar_interactive yes
scrollbar_jump_on_click yes
scrollbar_width 0.3
scrollbar_hover_width .7
scrollbar_handle_opacity 0.5
scrollbar_radius 0.3
scrollbar_gap 0.1
scrollbar_min_handle_height 1
scrollbar_hitbox_expansion 0.25
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0.1
# scrollbar_handle_color foreground
# scrollbar_track_color foreground
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 100
scrollback_fill_enlarged_window no
wheel_scroll_multiplier 5.0
wheel_scroll_min_lines 1
touch_scroll_multiplier 1.0

#: Tab bar {{{
tab_bar_edge bottom
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_style fade
tab_bar_align center
tab_bar_min_tabs 2
tab_switch_strategy previous
tab_fade 0.25 0.5 0.75 1
tab_separator " ┇"
tab_powerline_style angled
tab_activity_symbol none
tab_title_max_length 30
tab_title_template "{title}"
active_tab_title_template "{title} [{tab.active_wd.rsplit('/', 1)[-1] or tab.active_wd}]"
active_tab_font_style bold
inactive_tab_font_style normal
# tab_bar_margin_color none

#: Terminal bell {{{
enable_audio_bell no
visual_bell_duration 3.5
 visual_bell_color cyan
window_alert_on_bell yes
bell_on_tab "🔔 "
command_on_bell none
bell_path none
linux_bell_theme __custom

#: Text cursor customization {{{
cursor #00ffd4
cursor_text_color #000b09
cursor_shape block
cursor_shape_unfocused block
cursor_beam_thickness 1.5
cursor_underline_thickness 2.0
cursor_blink_interval -1
cursor_stop_blinking_after 0
cursor_trail 1
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2
cursor_trail_color #00ffd4

#: The color table {{{

#: Window layout {{{
remember_window_size yes
initial_window_width 640
initial_window_height 400
remember_window_position no
enabled_layouts *
window_resize_step_cells 2
window_resize_step_lines 2
window_border_width 0.0pt
draw_minimal_borders yes
draw_window_borders_for_single_window no
window_margin_width 4
single_window_margin_width -1
window_padding_width 4
single_window_padding_width -1
placement_strategy center
inactive_text_alpha 1.0
hide_window_decorations no
window_logo_path none.
window_logo_position bottom-right
window_logo_alpha 0.5
window_logo_scale 0
resize_debounce_time 0.1 0.5
resize_in_steps no
# visual_window_select_characters 1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ
confirm_os_window_close -1

